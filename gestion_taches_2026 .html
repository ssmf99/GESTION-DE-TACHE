<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau des Tâches 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080b10;
  --surface:   #0f1318;
  --surface2:  #171d25;
  --border:    #1e2530;
  --border2:   #2a3342;
  --text:      #dde4f0;
  --text2:     #8a97b0;
  --muted:     #5a6478;
  --shadow:    0 1px 4px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
  --shadow-lg: 0 2px 8px rgba(0,0,0,.4), 0 8px 32px rgba(0,0,0,.3);

  --khassida:    #8b5cf6;  --khassida-bg: rgba(139,92,246,.12);  --khassida-bd: rgba(139,92,246,.3);
  --lecture:     #e879f9;  --lecture-bg:  rgba(232,121,249,.12); --lecture-bd:  rgba(232,121,249,.3);
  --business:    #06b6d4;  --business-bg: rgba(6,182,212,.12);   --business-bd: rgba(6,182,212,.3);
  --podcast:     #f59e0b;  --podcast-bg:  rgba(245,158,11,.12);  --podcast-bd:  rgba(245,158,11,.3);
  --projet:      #fb923c;  --projet-bg:   rgba(251,146,60,.12);  --projet-bd:   rgba(251,146,60,.3);
  --attcom:      #f472b6;  --attcom-bg:   rgba(244,114,182,.12); --attcom-bd:   rgba(244,114,182,.3);
  --sanbn:       #10b981;  --sanbn-bg:    rgba(16,185,129,.12);  --sanbn-bd:    rgba(16,185,129,.3);
  --yessal:      #34d399;  --yessal-bg:   rgba(52,211,153,.12);  --yessal-bd:   rgba(52,211,153,.3);
  --youtube:     #ef4444;  --youtube-bg:  rgba(239,68,68,.12);   --youtube-bd:  rgba(239,68,68,.3);
  --sport:       #f97316;  --sport-bg:    rgba(249,115,22,.12);  --sport-bd:    rgba(249,115,22,.3);

  --done:   #22c55e;
  --font:   'Plus Jakarta Sans', sans-serif;
  --mono:   'JetBrains Mono', monospace;
  --r:      14px;
  --r-sm:   8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  font-size: 14px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(139,92,246,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(139,92,246,.018) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none; z-index: 0;
}
header, .date-nav, .layout { position: relative; z-index: 1; }

/* ── HEADER ────────────────────────────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 56px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow);
}

.brand { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
.brand-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, #7C3AED 0%, #0369A1 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.brand-title { font-size: 14px; font-weight: 800; letter-spacing: -.3px; }
.brand-title span { color: var(--muted); font-weight: 500; }

.month-strip { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
.month-strip::-webkit-scrollbar { display: none; }
.month-btn {
  background: none; border: 1px solid transparent;
  color: var(--muted); font-family: var(--font); font-size: 11px;
  font-weight: 700; letter-spacing: .5px; padding: 4px 10px;
  border-radius: 20px; cursor: pointer; text-transform: uppercase;
  transition: all .13s; white-space: nowrap; flex-shrink: 0;
}
.month-btn:hover { color: var(--text); background: var(--surface2); }
.month-btn.active { background: var(--khassida); color: #fff; border-color: var(--khassida); }

.hdr-right { margin-left: auto; }
#resetBtn {
  background: none; border: 1px solid var(--border2);
  border-radius: var(--r-sm); color: var(--muted);
  font-size: 10px; font-family: var(--font); font-weight: 700;
  padding: 4px 9px; cursor: pointer; transition: all .13s;
  text-transform: uppercase; letter-spacing: .4px;
}
#resetBtn:hover { color: #DC2626; border-color: #FECACA; }

/* ── DATE NAV ──────────────────────────────────────────────────────────────── */
.date-nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 24px;
  display: flex; gap: 3px; overflow-x: auto; scrollbar-width: none;
}
.date-nav::-webkit-scrollbar { display: none; }

.day-btn {
  flex-shrink: 0; background: none; border: 1px solid transparent;
  color: var(--muted); font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 5px 8px; border-radius: var(--r-sm); cursor: pointer;
  transition: all .13s; text-align: center; min-width: 42px; line-height: 1.3;
}
.day-btn:hover { color: var(--text); background: var(--surface2); }
.day-btn.active { background: var(--surface2); border-color: var(--khassida); color: var(--text); }
.day-btn .sc { display: block; font-size: 9px; margin-top: 1px; color: var(--done); font-weight: 600; }
.day-btn.active .sc { color: #4ade80; }

/* ── LAYOUT ─────────────────────────────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 1fr 272px;
  min-height: calc(100vh - 110px);
  align-items: start;
}

.task-area { padding: 20px 24px; border-right: 1px solid var(--border); }

/* ── DAY HERO ────────────────────────────────────────────────────────────────── */
.day-hero {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 20px;
  box-shadow: var(--shadow);
}
.day-big { font-size: 24px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
.day-sub { color: var(--muted); font-size: 12px; margin-top: 3px; font-weight: 500; }

.hero-score { text-align: right; }
.score-num {
  font-size: 36px; font-weight: 800; font-family: var(--mono); line-height: 1; color: var(--done);
}
.score-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

/* ── COLUMNS ─────────────────────────────────────────────────────────────────── */
.cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.col-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--muted); font-weight: 700; padding: 0 2px 9px;
  border-bottom: 2px solid var(--border); margin-bottom: 10px;
}

/* ── CATEGORY CARD ────────────────────────────────────────────────────────────── */
.cat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  transition: border-color .18s, box-shadow .18s;
  animation: fadeUp .22s ease both;
}
.cat-card:hover { border-color: var(--border2); box-shadow: var(--shadow-lg); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

.cat-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px; cursor: pointer; user-select: none; transition: background .1s;
}
.cat-head:hover { background: var(--surface2); }

.cat-left { display: flex; align-items: center; gap: 8px; }

.cat-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px 3px 7px; border-radius: 20px;
  font-size: 11px; font-weight: 700; letter-spacing: .2px;
}

.cat-cnt { font-size: 11px; color: var(--muted); font-family: var(--mono); }

.cat-right { display: flex; align-items: center; gap: 7px; }
.mpbar { width: 48px; height: 4px; background: var(--border); border-radius: 3px; overflow: hidden; }
.mpfill { height: 100%; border-radius: 3px; transition: width .45s ease; }
.cat-pct { font-family: var(--mono); font-size: 12px; font-weight: 600; min-width: 32px; text-align: right; }
.chevron { color: var(--muted); font-size: 10px; transition: transform .18s; }
.cat-card.open .chevron { transform: rotate(180deg); }

.tasks-body { border-top: 1px solid var(--border); display: none; }
.cat-card.open .tasks-body { display: block; }

/* ── SELECT ALL ──────────────────────────────────────────────────────────────── */
.cat-selall {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.selall-chk {
  width: 17px; height: 17px; border-radius: 4px; border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .18s; font-size: 10px; cursor: pointer;
  background: var(--surface2);
}
.selall-chk.all-done { border-color: var(--done); background: rgba(34,197,94,.15); color: var(--done); }
.selall-chk.partial  { border-color: var(--muted); color: var(--muted); }
.selall-lbl {
  font-size: 11px; font-weight: 700; color: var(--text2);
  cursor: pointer; user-select: none; flex: 1;
}
.selall-hint { font-size: 10px; color: var(--muted); font-family: var(--mono); }

/* ── TASK ITEM ───────────────────────────────────────────────────────────────── */
.t-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s;
}
.t-item:last-of-type { border-bottom: none; }
.t-item:hover { background: var(--surface2); }

.t-chk {
  width: 17px; height: 17px; border-radius: 4px; border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .18s; font-size: 10px; background: var(--surface);
}
.t-item.done .t-chk { border-color: var(--done); background: #dcfce7; color: var(--done); }

.t-txt { font-size: 13px; line-height: 1.4; transition: color .13s; flex: 1; font-weight: 500; }
.t-item.done .t-txt { text-decoration: line-through; color: var(--muted); font-weight: 400; }

.t-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }

.t-btn {
  height: 23px; border-radius: 6px; border: 1px solid;
  cursor: pointer; display: flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 700; font-family: var(--font);
  transition: all .12s; padding: 0 7px; white-space: nowrap;
}
.t-btn.edit { color: var(--lecture); border-color: var(--lecture-bd); background: var(--lecture-bg); }
.t-btn.edit:hover { background: #dbeafe; }
.t-btn.del  { color: var(--youtube); border-color: var(--youtube-bd); background: var(--youtube-bg); }
.t-btn.del:hover  { background: #fee2e2; }

/* ── INLINE EDIT ─────────────────────────────────────────────────────────────── */
.t-edit-form {
  display: none; align-items: center; gap: 6px;
  padding: 8px 14px; background: var(--surface2); border-top: 1px solid var(--border);
}
.t-edit-form.show { display: flex; }
.t-edit-inp {
  flex: 1; background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r-sm); color: var(--text); font-family: var(--font);
  font-size: 12px; padding: 6px 9px; outline: none; transition: border-color .13s;
}
.t-edit-inp:focus { border-color: var(--lecture); box-shadow: 0 0 0 3px rgba(3,105,161,.07); }
.t-edit-ok {
  background: var(--done); border: none; border-radius: var(--r-sm); color: #fff;
  font-family: var(--font); font-size: 11px; font-weight: 700; padding: 6px 11px;
  cursor: pointer; white-space: nowrap;
}
.t-edit-cancel {
  background: none; border: 1px solid var(--border2); border-radius: var(--r-sm);
  color: var(--muted); font-family: var(--font); font-size: 11px;
  padding: 6px 9px; cursor: pointer;
}
.t-edit-cancel:hover { color: var(--text); }

/* ── ADD ROW ─────────────────────────────────────────────────────────────────── */
.add-row { padding: 7px 14px; }
.add-btn {
  background: none; border: none; color: var(--muted); font-family: var(--font);
  font-size: 12px; cursor: pointer; display: flex; align-items: center;
  gap: 5px; transition: color .12s; font-weight: 600;
}
.add-btn:hover { color: var(--text); }
.add-form { display: none; padding: 7px 14px; gap: 6px; border-top: 1px dashed var(--border); }
.add-form.show { display: flex; }
.add-inp {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--r-sm); color: var(--text); font-family: var(--font);
  font-size: 12px; padding: 6px 9px; outline: none;
}
.add-inp:focus { border-color: var(--lecture); }
.add-ok {
  background: var(--khassida); border: none; border-radius: var(--r-sm); color: #fff;
  font-family: var(--font); font-size: 11px; font-weight: 700; padding: 6px 12px; cursor: pointer;
}
.add-ok:hover { opacity: .82; }

/* ── SIDEBAR ─────────────────────────────────────────────────────────────────── */
.sidebar {
  padding: 20px 18px;
  display: flex; flex-direction: column; gap: 12px;
  position: sticky; top: 56px;
  max-height: calc(100vh - 56px); overflow-y: auto;
}
.s-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px; box-shadow: var(--shadow);
}
.s-title {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--muted); font-weight: 700; margin-bottom: 11px;
}

/* ── SCORE CARDS ─────────────────────────────────────────────────────────────── */
.score-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.sc-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 13px; box-shadow: var(--shadow);
}
.sc-card-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 700; margin-bottom: 5px; }
.sc-card-num { font-size: 26px; font-weight: 800; font-family: var(--mono); line-height: 1; margin-bottom: 3px; }
.sc-card-sub { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-bottom: 8px; }
.sc-card-bar { height: 4px; background: var(--border); border-radius: 3px; overflow: hidden; }
.sc-card-fill { height: 100%; border-radius: 3px; transition: width .65s cubic-bezier(.4,0,.2,1); }

.sc-month .sc-card-num { color: var(--khassida); }
.sc-month .sc-card-fill { background: linear-gradient(90deg, var(--khassida), var(--lecture)); }
.sc-year .sc-card-num   { color: var(--done); }
.sc-year .sc-card-fill  { background: linear-gradient(90deg, var(--done), var(--business)); }
.sc-week .sc-card-num   { color: var(--podcast); }
.sc-week .sc-card-fill  { background: linear-gradient(90deg, var(--podcast), var(--projet)); }

/* ── BREAKDOWN ───────────────────────────────────────────────────────────────── */
.breakdown { display: flex; flex-direction: column; gap: 8px; }
.bk-row { display: flex; align-items: center; gap: 7px; }
.bk-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.bk-name { font-size: 10px; font-weight: 700; min-width: 68px; }
.bk-bar-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.bk-bar { height: 100%; border-radius: 3px; transition: width .45s ease; }
.bk-pct { font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--text2); min-width: 30px; text-align: right; }

/* ── WEEK CHART ──────────────────────────────────────────────────────────────── */
.week-chart { display: flex; align-items: flex-end; gap: 4px; height: 56px; }
.wc-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; height: 100%; justify-content: flex-end; }
.wc-bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 3px; transition: height .35s ease; }
.wc-lbl { font-family: var(--mono); font-size: 9px; color: var(--muted); }

/* ── NOTE ────────────────────────────────────────────────────────────────────── */
.note-ta {
  width: 100%; min-height: 76px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: var(--r-sm);
  color: var(--text); font-family: var(--font); font-size: 12px;
  padding: 9px; outline: none; resize: vertical; line-height: 1.5;
}
.note-ta:focus { border-color: var(--lecture); box-shadow: 0 0 0 3px rgba(3,105,161,.06); }
.note-ta::placeholder { color: var(--muted); }

/* ── TOAST ───────────────────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 18px; right: 18px;
  background: var(--surface2); color: var(--text); border: 1px solid var(--border2);
  border-radius: 10px; padding: 9px 16px; font-size: 12px; font-weight: 600;
  opacity: 0; transform: translateY(8px); transition: all .2s;
  pointer-events: none; z-index: 999; box-shadow: var(--shadow-lg);
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── COLOR SYSTEM ────────────────────────────────────────────────────────────── */
.pill-khassida { background: var(--khassida-bg); color: var(--khassida); border: 1px solid var(--khassida-bd); }
.pill-lecture  { background: var(--lecture-bg);  color: var(--lecture);  border: 1px solid var(--lecture-bd);  }
.pill-business { background: var(--business-bg); color: var(--business); border: 1px solid var(--business-bd); }
.pill-podcast  { background: var(--podcast-bg);  color: var(--podcast);  border: 1px solid var(--podcast-bd);  }
.pill-projet   { background: var(--projet-bg);   color: var(--projet);   border: 1px solid var(--projet-bd);   }
.pill-attcom   { background: var(--attcom-bg);   color: var(--attcom);   border: 1px solid var(--attcom-bd);   }
.pill-sanbn    { background: var(--sanbn-bg);    color: var(--sanbn);    border: 1px solid var(--sanbn-bd);    }
.pill-yessal   { background: var(--yessal-bg);   color: var(--yessal);   border: 1px solid var(--yessal-bd);   }
.pill-youtube  { background: var(--youtube-bg);  color: var(--youtube);  border: 1px solid var(--youtube-bd);  }
.pill-sport    { background: var(--sport-bg);    color: var(--sport);    border: 1px solid var(--sport-bd);    }

/* Dark-mode edit/del buttons */
.t-btn.edit { color: var(--business); border-color: var(--business-bd); background: var(--business-bg); }
.t-btn.edit:hover { background: rgba(6,182,212,.22); }
.t-btn.del  { color: var(--youtube);  border-color: var(--youtube-bd);  background: var(--youtube-bg);  }
.t-btn.del:hover  { background: rgba(239,68,68,.22); }

.fill-khassida { background: var(--khassida); } .fill-lecture  { background: var(--lecture);  }
.fill-business { background: var(--business); } .fill-podcast  { background: var(--podcast);  }
.fill-projet   { background: var(--projet);   } .fill-attcom   { background: var(--attcom);   }
.fill-sanbn    { background: var(--sanbn);    } .fill-yessal   { background: var(--yessal);   }
.fill-youtube  { background: var(--youtube);  }
.fill-sport    { background: var(--sport);    }

.dot-khassida { background: var(--khassida); } .dot-lecture  { background: var(--lecture);  }
.dot-business { background: var(--business); } .dot-podcast  { background: var(--podcast);  }
.dot-projet   { background: var(--projet);   } .dot-attcom   { background: var(--attcom);   }
.dot-sanbn    { background: var(--sanbn);    } .dot-yessal   { background: var(--yessal);   }
.dot-youtube  { background: var(--youtube);  }
.dot-sport    { background: var(--sport);    }

.tc-khassida { color: var(--khassida); } .tc-lecture  { color: var(--lecture);  }
.tc-business { color: var(--business); } .tc-podcast  { color: var(--podcast);  }
.tc-projet   { color: var(--projet);   } .tc-attcom   { color: var(--attcom);   }
.tc-sanbn    { color: var(--sanbn);    } .tc-yessal   { color: var(--yessal);   }
.tc-youtube  { color: var(--youtube);  }
.tc-sport    { color: var(--sport);    }

/* ── RESPONSIVE ──────────────────────────────────────────────────────────────── */
@media(max-width:1024px){
  .layout { grid-template-columns: 1fr; }
  .task-area { border-right: none; border-bottom: 1px solid var(--border); }
  .sidebar { position: static; max-height: none; }
}
@media(max-width:900px){
  .score-cards { grid-template-columns: 1fr 1fr 1fr; }
}
@media(max-width:640px){
  .cols { grid-template-columns: 1fr; }
  .score-cards { grid-template-columns: 1fr; }
  .day-big { font-size: 20px; } .score-num { font-size: 28px; }
  header, .task-area, .sidebar { padding: 12px 14px; }
  .date-nav { padding: 6px 14px; }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">✦</div>
    <div class="brand-title">TÂCHES 2026</div>
  </div>
  <div class="month-strip" id="monthStrip"></div>
  <div class="hdr-right">
    <button id="resetBtn" onclick="if(confirm('Réinitialiser toutes les données ?')){localStorage.clear();location.reload();}">↺ Reset</button>
  </div>
</header>

<nav class="date-nav" id="dateNav"></nav>

<div class="layout">
  <div class="task-area">
    <div class="day-hero">
      <div>
        <div class="day-big" id="dayTitle">—</div>
        <div class="day-sub" id="daySubtitle">Sélectionnez un jour</div>
      </div>

<script>
const MONTHS = ['FEVRIER','MARS','AVRIL','MAI','JUIN','JUILLET','AOUT','SEPTEMBRE','OCTOBRE','NOVEMBRE','DECEMBRE'];
const MONTH_NUM  = {FEVRIER:2,MARS:3,AVRIL:4,MAI:5,JUIN:6,JUILLET:7,AOUT:8,SEPTEMBRE:9,OCTOBRE:10,NOVEMBRE:11,DECEMBRE:12};
const MONTH_DAYS = {FEVRIER:28,MARS:31,AVRIL:30,MAI:31,JUIN:30,JUILLET:31,AOUT:31,SEPTEMBRE:30,OCTOBRE:31,NOVEMBRE:30,DECEMBRE:31};

const COL_A = [

const COL_B = [

    {id:'yt3', text:'Répondre aux commentaires'},

];

const ALL_CATS = [...COL_A, ...COL_B];

// ── TÂCHES FIXES À PARTIR DU 13 MARS ─────────────────────────────────────────
// SAN-BN : nouvelles tâches fixes dès le 13/03
const SANBN_EXTRA = [

  {id:'yg6',  text:'Se rendre au siar'},
  {id:'yg7',  text:'Taabi Adiya'},
  {id:'yg8',  text:'Taabi Tawassoulou'},

  {id:'yg12', text:'Tew daara'},
  {id:'yg13', text:'Feuss thi liguey bi'},
];

// Injecte les tâches extra si le jour >= 13 Mars (ou tout mois après Mars)
function injectExtraTasks(m, d, dayData){
  const mn = MONTH_NUM[m] || 0;
  const isFrom13Mars = (mn === 3 && d >= 13) || mn > 3;
  if(!isFrom13Mars) return;

  // SAN-BN extras
  SANBN_EXTRA.forEach(t=>{
    const already = dayData.tasks['sanbn'].some(x=>x.id===t.id);
    if(!already) dayData.tasks['sanbn'].push({...t, done:false});
  });

  // YESSAL extras
  YESSAL_EXTRA.forEach(t=>{
    const already = dayData.tasks['yessal'].some(x=>x.id===t.id);
    if(!already) dayData.tasks['yessal'].push({...t, done:false});
  });
}

// ── PERSISTENCE ───────────────────────────────────────────────────────────────
const LS_STORE='taches2026_store', LS_STATE='taches2026_state';
function saveStore(){ try{localStorage.setItem(LS_STORE,JSON.stringify(store));}catch(e){} }
function loadStore(){ try{const r=localStorage.getItem(LS_STORE);return r?JSON.parse(r):{};}catch(e){return{};} }
function saveState(){ try{localStorage.setItem(LS_STATE,JSON.stringify({curMonth,curDay,openCats:[...openCats]}));}catch(e){} }
function loadState(){ try{const r=localStorage.getItem(LS_STATE);return r?JSON.parse(r):null;}catch(e){return null;} }

// ── STORE ─────────────────────────────────────────────────────────────────────
let store=loadStore();
function key(m,d){ return `${m}-${d}`; }
function init(m,d){
  const k=key(m,d);
  if(!store[k]){
    const tasks={};
    ALL_CATS.forEach(cat=>{tasks[cat.id]=cat.tasks.map(t=>({...t,done:false}));});
    store[k]={tasks,note:''};
    injectExtraTasks(m,d,store[k]);
    saveStore();
  } else {
    ALL_CATS.forEach(cat=>{ if(!store[k].tasks[cat.id]) store[k].tasks[cat.id]=cat.tasks.map(t=>({...t,done:false})); });
    // Inject fixed tasks for days >= 13 Mars (idempotent — checks by id)
    injectExtraTasks(m,d,store[k]);
    saveStore();
  }
  return store[k];
}

// ── STATE ─────────────────────────────────────────────────────────────────────
const sv=loadState();
let curMonth=sv?sv.curMonth:'FEVRIER';
let curDay  =sv?sv.curDay  :4;
const openCats=new Set(sv?sv.openCats:['khassida','lecture']);

// ── SCORES ───────────────────────────────────────────────────────────────────
function catScore(items){ return items&&items.length?Math.round(items.filter(i=>i.done).length/items.length*100):0; }
function dayScore(tasks){
  let tot=0,dn=0;
  ALL_CATS.forEach(c=>{const it=tasks[c.id]||[];tot+=it.length;dn+=it.filter(i=>i.done).length;});
  return tot===0?0:Math.round(dn/tot*100);
}
function monthScore(month){
  const total=MONTH_DAYS[month]||30;let sum=0,active=0;
  for(let d=1;d<=total;d++){const k=key(month,d);if(store[k]){sum+=dayScore(store[k].tasks);active++;}}
  return{pct:active===0?0:Math.round(sum/active),days:active};
}
function yearScore(){
  let sum=0,active=0;
  MONTHS.forEach(m=>{const total=MONTH_DAYS[m]||30;for(let d=1;d<=total;d++){const k=key(m,d);if(store[k]){sum+=dayScore(store[k].tasks);active++;}}});
  return{pct:active===0?0:Math.round(sum/active),days:active};
}
function weekScore(){
  // Semaine du jour courant (lundi–dimanche, 7 jours glissants)
  const total=MONTH_DAYS[curMonth]||30;
  const weekStart=curDay-((curDay-1)%7);  // premier jour de la semaine de 7j
  let sum=0,active=0;
  for(let d=weekStart;d<weekStart+7&&d<=total;d++){
    const k=key(curMonth,d);
    if(store[k]){sum+=dayScore(store[k].tasks);active++;}
  }
  return{pct:active===0?0:Math.round(sum/active),days:active,start:weekStart,end:Math.min(weekStart+6,total)};
}
function pluriel(n,word){ return n+' '+word+(n>1?'s':''); }
function updateGlobalScores(){
  const ms=monthScore(curMonth), ws=weekScore(), ys=yearScore();
  document.getElementById('monthScore').textContent   = ms.pct+'%';
  document.getElementById('monthScoreSub').textContent= pluriel(ms.days,'jour actif');
  document.getElementById('monthScoreBar').style.width= ms.pct+'%';
  document.getElementById('weekScore').textContent    = ws.pct+'%';
  document.getElementById('weekScoreSub').textContent = 'J'+ws.start+'–J'+ws.end+' · '+pluriel(ws.days,'jour actif');
  document.getElementById('weekScoreBar').style.width = ws.pct+'%';
  document.getElementById('yearScore').textContent    = ys.pct+'%';
  document.getElementById('yearScoreSub').textContent = pluriel(ys.days,'jour actif');
  document.getElementById('yearScoreBar').style.width = ys.pct+'%';
}

// ── MONTH STRIP ───────────────────────────────────────────────────────────────
function buildMonths(){
  const el=document.getElementById('monthStrip');
  el.innerHTML=MONTHS.map(m=>`<button class="month-btn${m===curMonth?' active':''}" data-m="${m}">${m.slice(0,3)}</button>`).join('');
  el.querySelectorAll('.month-btn').forEach(b=>b.onclick=()=>{curMonth=b.dataset.m;curDay=1;saveState();rebuildAll();});
}

// ── DATE NAV ──────────────────────────────────────────────────────────────────
function buildDates(){
  const el=document.getElementById('dateNav');
  const total=MONTH_DAYS[curMonth]||30;
  el.innerHTML='';
  for(let d=1;d<=total;d++){
    const k=key(curMonth,d);
    const sc=store[k]?dayScore(store[k].tasks):0;
    const btn=document.createElement('button');
    btn.className='day-btn'+(d===curDay?' active':'');
    btn.innerHTML=`${String(d).padStart(2,'0')}<span class="sc">${sc>0?sc+'%':''}</span>`;
    btn.onclick=()=>{curDay=d;saveState();rebuildAll();};
    el.appendChild(btn);
  }
  setTimeout(()=>{const a=el.querySelector('.active');if(a)a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});},60);
}

// ── DAY VIEW ──────────────────────────────────────────────────────────────────
function buildDay(){
  const data=init(curMonth,curDay);
  const mn=MONTH_NUM[curMonth];
  const dow=new Date(2026,mn-1,curDay).toLocaleDateString('fr-FR',{weekday:'long'});
  document.getElementById('dayTitle').textContent    =`${curDay} ${curMonth}`;
  document.getElementById('daySubtitle').textContent =`${dow[0].toUpperCase()+dow.slice(1)} 2026`;
  document.getElementById('globalScore').textContent =dayScore(data.tasks)+'%';
  document.getElementById('noteArea').value=data.note;
  document.getElementById('noteArea').oninput=()=>{data.note=document.getElementById('noteArea').value;saveStore();};
  renderCol('colA',COL_A,data);
  renderCol('colB',COL_B,data);
  buildSidebar(data);
}

// ── RENDER COLUMN ─────────────────────────────────────────────────────────────
function renderCol(elId,cats,data){
  const wrap=document.getElementById(elId);
  wrap.innerHTML='';
  cats.forEach((cat,ci)=>{
    const items=data.tasks[cat.id];
    const pct=catScore(items);
    const dn=items.filter(i=>i.done).length;
    const allDone=items.length>0&&items.every(i=>i.done);
    const anyDone=items.some(i=>i.done);
    const selState=allDone?'all-done':anyDone?'partial':'';

    const card=document.createElement('div');
    card.className='cat-card';
    card.style.animationDelay=(ci*0.055)+'s';

    card.innerHTML=`
      <div class="cat-head">
        <div class="cat-left">
          <div class="cat-pill pill-${cat.color}"><span>${cat.icon}</span><span>${cat.name}</span></div>
          <span class="cat-cnt">${dn}/${items.length}</span>
        </div>
        <div class="cat-right">
          <div class="mpbar"><div class="mpfill fill-${cat.color}" style="width:${pct}%"></div></div>
          <span class="cat-pct tc-${cat.color}">${pct}%</span>
          <span class="chevron">▾</span>
        </div>
      </div>
      <div class="tasks-body">
        <div class="cat-selall">
          <div class="selall-chk ${selState}" data-cat="${cat.id}">${allDone?'✓':anyDone?'–':''}</div>
          <span class="selall-lbl" data-cat="${cat.id}">Tout ${allDone?'décocher':'cocher'}</span>
          <span class="selall-hint">${dn}/${items.length} fait${dn>1?'s':''}</span>
        </div>
        ${items.map((it,ii)=>`
          <div class="t-item${it.done?' done':''}" data-cat="${cat.id}" data-ii="${ii}">
            <div class="t-chk">${it.done?'✓':''}</div>
            <span class="t-txt">${it.text}</span>
            <div class="t-actions">
              <button class="t-btn edit" data-cat="${cat.id}" data-ii="${ii}">✏️ Modifier</button>
              <button class="t-btn del"  data-cat="${cat.id}" data-ii="${ii}">🗑️ Suppr.</button>
            </div>
          </div>
          <div class="t-edit-form" id="ef-${cat.id}-${ii}">
            <input class="t-edit-inp" id="ei-${cat.id}-${ii}" value="${it.text.replace(/"/g,'&quot;')}" placeholder="Modifier…"/>
            <button class="t-edit-ok" data-cat="${cat.id}" data-ii="${ii}">✓ OK</button>
            <button class="t-edit-cancel" data-cat="${cat.id}" data-ii="${ii}">✕</button>
          </div>`).join('')}
        <div class="add-row">
          <button class="add-btn" data-cat="${cat.id}">＋ Ajouter une tâche</button>
        </div>
        <div class="add-form" id="af-${cat.id}">
          <input class="add-inp" id="ai-${cat.id}" placeholder="Nouvelle tâche…"/>
          <button class="add-ok" data-cat="${cat.id}">OK</button>
        </div>
      </div>`;

    card.querySelector('.cat-head').onclick=()=>{
      if(openCats.has(cat.id)) openCats.delete(cat.id); else openCats.add(cat.id);
      saveState(); card.classList.toggle('open');
    };

    const doSelAll=(e)=>{
      e.stopPropagation();
      const nv=!data.tasks[cat.id].every(i=>i.done);
      data.tasks[cat.id].forEach(t=>t.done=nv);
      saveStore(); renderSmart(elId,cats,data); updateScores(data);
      showToast(nv?'✅ Toutes cochées':'⬜ Toutes décochées');
    };
    card.querySelector('.selall-chk').onclick=doSelAll;
    card.querySelector('.selall-lbl').onclick=doSelAll;

    card.querySelectorAll('.t-item').forEach(el=>{
      el.onclick=(e)=>{
        if(e.target.closest('.t-actions')) return;
        data.tasks[cat.id][+el.dataset.ii].done=!data.tasks[cat.id][+el.dataset.ii].done;
        saveStore(); renderSmart(elId,cats,data); updateScores(data);
      };
    });

    card.querySelectorAll('.t-btn.del').forEach(btn=>{
      btn.onclick=(e)=>{
        e.stopPropagation();
        data.tasks[cat.id].splice(+btn.dataset.ii,1);
        saveStore(); renderSmart(elId,cats,data); updateScores(data);
        showToast('🗑️ Tâche supprimée');
      };
    });

    card.querySelectorAll('.t-btn.edit').forEach(btn=>{
      btn.onclick=(e)=>{
        e.stopPropagation();
        card.querySelectorAll('.t-edit-form.show').forEach(f=>f.classList.remove('show'));
        const form=document.getElementById(`ef-${btn.dataset.cat}-${btn.dataset.ii}`);
        form.classList.add('show');
        document.getElementById(`ei-${btn.dataset.cat}-${btn.dataset.ii}`).focus();
      };
    });

    card.querySelectorAll('.t-edit-ok').forEach(btn=>{
      btn.onclick=(e)=>{
        e.stopPropagation();
        const ii=+btn.dataset.ii,cid=btn.dataset.cat;
        const inp=document.getElementById(`ei-${cid}-${ii}`);
        const txt=inp.value.trim();
        if(!txt) return;
        data.tasks[cid][ii].text=txt;
        saveStore();
        document.getElementById(`ef-${cid}-${ii}`).classList.remove('show');
        renderSmart(elId,cats,data); updateScores(data);
        showToast('✏️ Tâche modifiée');
      };
    });

    card.querySelectorAll('.t-edit-cancel').forEach(btn=>{
      btn.onclick=(e)=>{e.stopPropagation();document.getElementById(`ef-${btn.dataset.cat}-${btn.dataset.ii}`).classList.remove('show');};
    });

    card.querySelectorAll('.t-edit-inp').forEach(inp=>{
      inp.onkeydown=(e)=>{
        if(e.key==='Enter'){e.preventDefault();inp.closest('.t-edit-form').querySelector('.t-edit-ok').click();}
        if(e.key==='Escape') inp.closest('.t-edit-form').querySelector('.t-edit-cancel').click();
      };
      inp.onclick=(e)=>e.stopPropagation();
    });

    card.querySelector('.add-btn').onclick=e=>{
      e.stopPropagation();
      const f=document.getElementById(`af-${cat.id}`);
      f.classList.toggle('show');
      if(f.classList.contains('show')) document.getElementById(`ai-${cat.id}`).focus();
    };

    card.querySelector('.add-ok').onclick=()=>{
      const inp=document.getElementById(`ai-${cat.id}`);
      const txt=inp.value.trim();
      if(!txt) return;
      data.tasks[cat.id].push({id:`${cat.id}-${Date.now()}`,text:txt,done:false});
      saveStore(); inp.value='';
      document.getElementById(`af-${cat.id}`).classList.remove('show');
      renderSmart(elId,cats,data); updateScores(data);
      showToast('✓ Tâche ajoutée');
    };

    const inp=document.getElementById(`ai-${cat.id}`);
    if(inp) inp.onkeydown=e=>{
      if(e.key==='Enter') card.querySelector('.add-ok').click();
      if(e.key==='Escape') document.getElementById(`af-${cat.id}`).classList.remove('show');
    };

    if(openCats.has(cat.id)) card.classList.add('open');
    wrap.appendChild(card);
  });
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function buildSidebar(data){
  document.getElementById('breakdown').innerHTML=ALL_CATS.map(cat=>{
    const pct=catScore(data.tasks[cat.id]);
    return `<div class="bk-row">
      <div class="bk-dot dot-${cat.color}"></div>
      <span class="bk-name tc-${cat.color}">${cat.name}</span>
      <div class="bk-bar-wrap"><div class="bk-bar fill-${cat.color}" style="width:${pct}%"></div></div>
      <span class="bk-pct">${pct}%</span>
    </div>`;
  }).join('');

  const wc=document.getElementById('weekChart');
  const total=MONTH_DAYS[curMonth]||30;
  const start=curDay-((curDay-1)%7);
  wc.innerHTML='';
  for(let d=start;d<start+7&&d<=total;d++){
    const k=key(curMonth,d);
    const sc=store[k]?dayScore(store[k].tasks):0;
    const h=sc>0?Math.max(6,Math.round(sc*0.48)):3;
    const active=d===curDay;
    wc.innerHTML+=`<div class="wc-col">
      <div class="wc-bar" style="height:${h}px;background:${active?'var(--khassida)':'var(--border2)'}"></div>
      <span class="wc-lbl">${d}</span>
    </div>`;
  }
}

function renderSmart(elId,cats,data){ renderCol(elId,cats,data); }

function updateScores(data){
  document.getElementById('globalScore').textContent=dayScore(data.tasks)+'%';
  buildSidebar(data); updateGlobalScores();
  document.querySelectorAll('.day-btn').forEach((btn,i)=>{
    const d=i+1,k=key(curMonth,d);
    const sc=store[k]?dayScore(store[k].tasks):0;
    const span=btn.querySelector('.sc');
    if(span) span.textContent=sc>0?sc+'%':'';
  });
}

function rebuildAll(){ buildMonths(); buildDates(); buildDay(); updateGlobalScores(); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── SEED ──────────────────────────────────────────────────────────────────────
(function seed(){
  const firstLaunch = !localStorage.getItem('taches2026_store');

  if(firstLaunch){
    // Pré-remplir Février avec scores du fichier Excel
    const scores={4:26,6:96,9:52,10:61,11:73,12:94,13:90,16:90,17:93,18:98,19:96,20:93,21:83,22:96,23:97,24:96,25:96,26:82,27:97,28:79};
    Object.entries(scores).forEach(([ds,sc])=>{
      const d=+ds,data=init('FEVRIER',d);
      if(sc<=0) return;
      let all=[];
      ALL_CATS.forEach(cat=>data.tasks[cat.id].forEach((_,ii)=>all.push({cat:cat.id,ii})));
      const dn=Math.round(all.length*sc/100);
      for(let i=0;i<Math.min(dn,all.length);i++) data.tasks[all[i].cat][all[i].ii].done=true;
    });
  }

  // Toujours injecter les tâches fixes du 13 Mars+
  // (idempotent : injectExtraTasks vérifie par id avant d'ajouter)
  const marsTotal = MONTH_DAYS['MARS'] || 31;
  for(let d=13; d<=marsTotal; d++) init('MARS', d);
  // Et tous les mois suivants (pour que les nouveaux jours soient prêts)
  ['AVRIL','MAI','JUIN','JUILLET','AOUT','SEPTEMBRE','OCTOBRE','NOVEMBRE','DECEMBRE'].forEach(m=>{
    const total = MONTH_DAYS[m]||30;
    for(let d=1; d<=total; d++) init(m, d);
  });

  saveStore();
})();

rebuildAll();
</script>
